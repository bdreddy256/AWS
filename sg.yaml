import boto3, sys

def quick_check(stack_name):
    def get_t(reg):
        return boto3.client('cloudformation', reg).get_template(
            StackName=stack_name, TemplateStage='Processed'
        )['TemplateBody']

    try:
        match = get_t('us-east-1') == get_t('us-east-2')
        print("✅ Match" if match else "❌ Mismatch")
    except Exception as e:
        print(f"Error: {e}")

if __name__ == "__main__":
    quick_check(sys.argv[1])
