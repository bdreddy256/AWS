#!/bin/bash
# Usage: cfn-execute-changeset <stack-name> <changeset-name>

STACK=$1
CHANGESET=$2

if [ -z "$STACK" ] || [ -z "$CHANGESET" ]; then
  echo "Usage: $0 <stack-name> <changeset-name>"
  exit 1
fi

echo "Executing change set '$CHANGESET' on stack '$STACK'..."
aws cloudformation execute-change-set \
  --stack-name "$STACK" \
  --change-set-name "$CHANGESET"

echo ""
echo "Waiting for stack update to complete..."
aws cloudformation wait stack-update-complete \
  --stack-name "$STACK"

echo ""
echo "Stack events:"
echo "-------------"
aws cloudformation describe-stack-events \
  --stack-name "$STACK" \
  --query 'StackEvents[*].{Time:Timestamp,Resource:LogicalResourceId,Status:ResourceStatus,Reason:ResourceStatusReason}' \
  --output table
