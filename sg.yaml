import ssl, urllib.parse, urllib.request
import xml.etree.ElementTree as ET

HOST = "10.0.0.9"      # <-- your Panorama IP/FQDN
APIKEY = "PASTE_KEY"   # <-- your superreader key

ctx = ssl.create_default_context()
ctx.check_hostname = False
ctx.verify_mode = ssl.CERT_NONE   # mgmt cert is usually self-signed

# Ask Panorama for its connected managed devices
params = {"type": "op",
          "cmd": "<show><devices><connected></connected></devices></show>",
          "key": APIKEY}
url = f"https://{HOST}/api/?" + urllib.parse.urlencode(params)

with urllib.request.urlopen(urllib.request.Request(url), context=ctx, timeout=15) as r:
    root = ET.fromstring(r.read())

print("API status:", root.get("status"))
devs = root.findall(".//devices/entry")
print(f"Connected devices: {len(devs)}")
for e in devs[:5]:
    print(" -", e.findtext("hostname"), e.get("name"))
